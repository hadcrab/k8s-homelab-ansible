---
# - name: Remove old legacy kubernetes repo file if exists
#  ansible.builtin.file:
#    path: /etc/apt/sources.list.d/kubernetes.list
#    state: absent

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Add k8s repo
  ansible.builtin.deb822_repository:
    name: kubernetes
    types: deb
    uris: "{{ k8s_uri }}"
    suites: /
    signed_by: "{{ k8s_release_key }}"

- name: Install k8s main packages
  ansible.builtin.apt:
    name:
      - kubeadm={{ k8s_version }}
      - kubelet={{ k8s_version }}
      - kubectl={{ k8s_version }}
    state: present
    update_cache: true
    allow_downgrades: true
    dpkg_options: "force-hold"
