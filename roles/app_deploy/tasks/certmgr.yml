---
- name: Add jetstack repo
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: "https://charts.jetstack.io"
  delegate_to: localhost
  become: false

- name: Install Cert-Manager with helm
  kubernetes.core.helm:
    name: certmgr
    chart_ref: jetstack/cert-manager
    chart_version: "{{ certmgr_version }}"
    release_namespace: cert-manager
    create_namespace: true
    kubeconfig: ~/.kube/config
    values:
      crds:
        enabled: true
    atomic: true
    wait: true
  delegate_to: localhost
  become: false

- name: Wait for cert-manager to be ready
  ansible.builtin.command: >
    kubectl wait --namespace cert-manager
    --for=condition=available deployment
    --all --timeout=120s
  environment:
    KUBECONFIG: "{{ lookup('env', 'HOME') }}/.kube/config"
  changed_when: false
  delegate_to: localhost

- name: Configure Self-Signed Local CA Infrastructure
  kubernetes.core.k8s:
    kubeconfig: ~/.kube/config
    definition:
# Uses self-signed CA (no real domain).
# To use Let's Encrypt instead:
#   1. Replace ClusterIssuer with:
#      kind: ClusterIssuer
#      spec:
#        acme:
#          server: https://acme-v02.api.letsencrypt.org/directory
#          email: you@domain.com
#          privateKeySecretRef:
#            name: letsencrypt-prod
#          solvers:
#            - http01:
#                ingress: {}
#   2. Point a real domain to your cluster IP
      - apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: selfsigned-issuer
        spec:
          selfSigned: {}

      - apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: local-ca
          namespace: cert-manager
        spec:
          isCA: true
          commonName: "Local Root CA"
          secretName: local-ca-secret
          issuerRef:
            name: selfsigned-issuer
            kind: ClusterIssuer

      - apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: local-ca-issuer
        spec:
          ca:
            secretName: local-ca-secret
  delegate_to: localhost
