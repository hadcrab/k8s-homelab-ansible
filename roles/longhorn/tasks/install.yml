---
- name: Add Longhorn repo
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: "https://charts.longhorn.io"
  delegate_to: localhost
  become: false

- name: Install Longhorn with helm
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "{{ longhorn_version }}"
    release_namespace: longhorn
    create_namespace: true
    values:
      persistence:
        defaultClassReplicaCount: "{{ longhorn_default_class_replicas }}"
      defaultSettings:
        defaultReplicaCount: "{{ longhorn_default_replica_count }}"
        replicaAutoBalance: "{{ longhorn_replica_auto_balance }}"
        storageMinimalAvailablePercentage: "{{ longhorn_storage_minimal_available_percentage }}"
        storageReservedPercentageForDefaultDisk: "{{ longhorn_storage_reserved_percentage_for_default_disk }}"
    kubeconfig: ~/.kube/config
    wait: true
  delegate_to: localhost
  become: false

- name: Expose Longhorn UI via Traefik
  kubernetes.core.k8s:
    kubeconfig: ~/.kube/config
    state: present
    definition:
      - apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: longhorn-ui
          namespace: longhorn
        spec:
          secretName: longhorn-ui-tls
          commonName: "longhorn.kube"
          dnsNames:
            - longhorn.kube
          issuerRef:
            name: local-ca-issuer
            kind: ClusterIssuer

      - apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: longhorn-ui
          namespace: longhorn
        spec:
          entryPoints:
            - web
            - websecure
          routes:
            - match: Host(`longhorn.kube`)
              kind: Rule
              services:
                - name: longhorn-frontend
                  port: 80
          tls:
            secretName: longhorn-ui-tls
  delegate_to: localhost
  become: false