---
- name: Prepare OS
  hosts: all
  become: true
  roles:
    - os_prep

- name: Install k8s packages
  hosts: all
  become: true
  roles:
    - k8s_setup
  tags: install

- name: Init control plane
  hosts: control_plane
  become: true
  roles:
    - role: k8s_setup
      tasks_from: master.yml
  tags: init

- name: Join workers
  hosts: workers
  become: true
  roles:
    - role: k8s_setup
      tasks_from: workers.yml
  tags: workers

- name: Deploy apps
  hosts: control_plane
  become: false
  roles:
    - app_deploy

- name: Install Longhorn prerequisites
  hosts: all
  become: true
  roles:
    - role: longhorn
      tasks_from: prereqs.yml
  tags: longhorn-prereqs

- name: Deploy Longhorn
  hosts: control_plane
  become: false
  roles:
    - role: longhorn
      tasks_from: install.yml
  tags: longhorn

- name: Deploy netcourse frontend
  hosts: control_plane
  become: false
  tasks:
    - ansible.builtin.include_tasks: apps/netcourse/frontend/deploy.yml
  tags: netcourse-frontend